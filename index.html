<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>碩赫科技｜驗屋預約</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">

  <header class="topbar">

    <div class="brand">

      <img
        src="assets/logo-white.png"
        alt="碩赫科技LOGO"
      >

      <div>

        <h1>碩赫科技</h1>

        <p>YAN HE TECHNOLOGY</p>

      </div>

    </div>

  </header>

  <section class="hero">

    <div class="hero-overlay"></div>

    <div class="hero-content">

      <h2>
        專業驗屋<br>
        守護您的家
      </h2>

      <p>
        嚴守專業｜嚴厲執行｜嚴苛驗屋
      </p>

      <button class="gold-btn">
        立即預約驗屋
      </button>

    </div>

  </section>

  <section class="features">

    <div class="feature-card">
      專業儀器檢測
    </div>

    <div class="feature-card">
      詳細電子報告
    </div>

    <div class="feature-card">
      驗屋經驗豐富
    </div>

    <div class="feature-card">
      LINE線上客服
    </div>

  </section>

  <section class="plans">

    <h3>驗屋方案</h3>

    <div id="planCards">

      <div class="plan-card">

        <div>

          <strong>小資版</strong>

          <span>
            22項檢驗項目
          </span>

        </div>

        <div class="price">
          $10,400起
        </div>

      </div>

      <div class="plan-card">

        <div>

          <strong>全方位版</strong>

          <span>
            35項檢驗項目
          </span>

        </div>

        <div class="price">
          $12,000起
        </div>

      </div>

      <div class="plan-card">

        <div>

          <strong>中古屋客製版</strong>

          <span>
            9項基本檢驗
          </span>

        </div>

        <div class="price">
          $5,000起
        </div>

      </div>

    </div>

  </section>

</div>

<script src="app.js"></script>

</body>
</html>
